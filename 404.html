  <style>
    .not-found-container {
      display: flex;
      flex-direction: column;
      align-items: center;

      text-align: center;
      padding: 0 20px;

    .not-found-container h1 {

    .not-found-container p {

      margin-bottom: 40px;
      line-height: 1.6;
    }
    .cta-button {
      background: var(--gold);
      color: #000;
      padding: 16px 32px;
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    .cta-button:hover {
      background: #e6b222;
      box-shadow: 0 0 20px var(--gold-glow);
    }
    .secondary-link {
      color: var(--muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }
    .secondary-link:hover {
      color: var(--gold);
